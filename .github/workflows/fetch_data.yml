name: Fetch weather data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch_weather:
    name: Fetch and pre-process weather data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        run: |
          pipx install uv

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install DVC S3 support
        run: |
          python -m pip install "dvc[s3]"

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Configure DVC remote
        env:
          DAGSHUB_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          DAGSHUB_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}
        run: |
          dvc remote add --force -d origin s3://dvc
          dvc remote modify origin endpointurl https://dagshub.com/Aljaz-R/IIS.s3
          dvc remote modify origin --local access_key_id "$DAGSHUB_ACCESS_KEY_ID"
          dvc remote modify origin --local secret_access_key "$DAGSHUB_SECRET_ACCESS_KEY"

      - name: Restore previous DVC artifacts
        run: |
          dvc pull -r origin || echo "DVC pull could not restore all artifacts; pipeline will rebuild them."

      - name: Reproduce DVC pipeline
        run: |
          dvc repro

      - name: Commit data changes
        env:
          DAGSHUB_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          DAGSHUB_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify origin --local access_key_id "$DAGSHUB_ACCESS_KEY_ID"
          dvc remote modify origin --local secret_access_key "$DAGSHUB_SECRET_ACCESS_KEY"
          dvc push -r origin
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add dvc.lock .dvc/config .gitignore
          git commit -m "Update weather data and model artifacts" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
